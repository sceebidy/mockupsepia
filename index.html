<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1200" />
<title>SEPIA — Analisis Hukum Berbasis AI</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Google Sans', 'DM Sans', sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 48px;
    border-bottom: 1px solid #f0f0f0;
  }
  .nav-brand {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #1a1a1a;
  }
  .nav-links {
    display: flex;
    gap: 32px;
  }
  .nav-links a {
    font-size: 14px;
    color: #555;
    text-decoration: none;
  }
  .nav-links a:hover { color: #1a1a1a; }
  .nav-cta {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .btn-outline {
    padding: 9px 22px;
    font-size: 14px;
    border: 1px solid #d0d0d0;
    border-radius: 999px;
    background: #fff;
    color: #1a1a1a;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-dark {
    padding: 9px 22px;
    font-size: 14px;
    border: none;
    border-radius: 999px;
    background: #1a1a1a;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
  }

  /* HERO */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 48px 60px;
  }

  .hero h1 {
    font-size: clamp(52px, 7vw, 88px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 28px;
    color: #1a1a1a;
  }

  .hero h1 .gradient-word {
    color: #1a5c2e;
    -webkit-text-fill-color: #1a5c2e;
  }

  .hero p {
    font-size: 18px;
    color: #666;
    line-height: 1.65;
    max-width: 560px;
    margin-bottom: 44px;
  }

  .hero-buttons {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn-hero-dark {
    padding: 16px 40px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 14px;
    background: #1a5c2e;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.01em;
  }

  .btn-hero-outline {
    padding: 16px 40px;
    font-size: 16px;
    font-weight: 500;
    border: 1.5px solid #d0d0d0;
    border-radius: 14px;
    background: #fff;
    color: #1a1a1a;
    cursor: pointer;
    font-family: inherit;
  }

  /* TRUST BADGES */
  .trust {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 52px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .trust-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    color: #888;
  }
  .trust-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #2e9e6b;
  }
  .trust-sep {
    width: 1px;
    height: 14px;
    background: #e0e0e0;
  }

  /* FOOTER */
  footer {
    border-top: 1px solid #f0f0f0;
    padding: 16px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: #aaa;
  }
</style>
</head>
<body>


<div class="hero">
  <h1>Analisis <span class="gradient-word">SEPIA</span></h1>

  <p>
    Asisten riset dan analisis hukum berbasis AI — diekstrak dari sumber yang kamu percaya, ditenagai model Gemini, Qwen, dan Llama terkini.
  </p>

  <div class="hero-buttons">
   <button class="btn-hero-dark" onclick="window.location.href='login2.html'">
  Masuk ke SEPIA
</button>
    <button class="btn-hero-outline">Daftar Gratis</button>
  </div>

  <div class="trust">
    <div class="trust-item"><div class="trust-dot"></div>Ekstraksi otomatis</div>
    <div class="trust-sep"></div>
    <div class="trust-item"><div class="trust-dot"></div>Kronologi & aktor</div>
    <div class="trust-sep"></div>
    <div class="trust-item"><div class="trust-dot"></div>Powered by Gemini · Qwen · Llama</div>
    <div class="trust-sep"></div>
    <div class="trust-item"><div class="trust-dot"></div>v 1.0</div>
  </div>
</div>

<footer>
  <span>SEPIA © 2026</span>
  <span>Powered by Gemini · Qwen · Llama</span>
</footer>

</body>
</html>
