<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1200" />
<title>SEPIA — Analisis Hukum Berbasis AI</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Google Sans', 'DM Sans', sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 48px;
    border-bottom: 1px solid #f0f0f0;
  }
  .nav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  /* LOGO KOMPONEN — ganti isi .logo-mark dan .logo-text sesuai aset kamu */
  .logo-mark {
    width: 34px;
    height: 34px;
    border-radius: 9px;
    background: #1a5c2e;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    /* 
      ── CARA GANTI KE GAMBAR ──────────────────────────────────────
      Hapus background & svg di bawah, lalu tambahkan:
      background: url('logo.png') center/cover no-repeat;
      ─────────────────────────────────────────────────────────────
    */
  }
  .logo-mark svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: #fff;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .logo-text {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #1a1a1a;
    /*
      ── CARA GANTI KE GAMBAR WORDMARK ────────────────────────────
      Hapus elemen .logo-text dari HTML dan gunakan:
      <img src="wordmark.svg" alt="SEPIA" height="20" />
      ─────────────────────────────────────────────────────────────
    */
  }

  .nav-links {
    display: flex;
    gap: 32px;
  }
  .nav-links a {
    font-size: 14px;
    color: #555;
    text-decoration: none;
  }
  .nav-links a:hover { color: #1a1a1a; }
  .nav-cta {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .btn-outline {
    padding: 9px 22px;
    font-size: 14px;
    border: 1px solid #d0d0d0;
    border-radius: 999px;
    background: #fff;
    color: #1a1a1a;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-dark {
    padding: 9px 22px;
    font-size: 14px;
    border: none;
    border-radius: 999px;
    background: #1a1a1a;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
  }

  /* HERO */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 48px 60px;
  }

  /* HERO LOGO — lebih besar, berdiri sendiri */
  .hero-logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-bottom: 36px;
  }
  .hero-logo-mark {
    width: 72px;
    height: 72px;
    border-radius: 20px;
    background: #1a5c2e;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px rgba(26,92,46,0.18);
    /*
      ── CARA GANTI KE GAMBAR ──────────────────────────────────────
      Hapus background & svg di bawah, lalu tambahkan:
      background: url('logo.png') center/cover no-repeat;
      ─────────────────────────────────────────────────────────────
    */
  }
  .hero-logo-mark svg {
    width: 36px;
    height: 36px;
    fill: none;
    stroke: #fff;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .hero-logo-label {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.18em;
    color: #aaa;
    text-transform: uppercase;
    /*
      ── CARA SEMBUNYIKAN LABEL ────────────────────────────────────
      Jika sudah punya wordmark, hapus elemen ini dari HTML.
      ─────────────────────────────────────────────────────────────
    */
  }

  .hero h1 {
    font-size: clamp(52px, 7vw, 88px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 28px;
    color: #1a1a1a;
  }

  .hero h1 .gradient-word {
    color: #1a5c2e;
    -webkit-text-fill-color: #1a5c2e;
  }

  .hero p {
    font-size: 18px;
    color: #666;
    line-height: 1.65;
    max-width: 560px;
    margin-bottom: 44px;
  }

  .hero-buttons {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn-hero-dark {
    padding: 16px 40px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 14px;
    background: #1a5c2e;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.01em;
  }

  .btn-hero-outline {
    padding: 16px 40px;
    font-size: 16px;
    font-weight: 500;
    border: 1.5px solid #d0d0d0;
    border-radius: 14px;
    background: #fff;
    color: #1a1a1a;
    cursor: pointer;
    font-family: inherit;
  }

  /* TRUST BADGES */
  .trust {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 52px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .trust-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    color: #888;
  }
  .trust-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #2e9e6b;
  }
  .trust-sep {
    width: 1px;
    height: 14px;
    background: #e0e0e0;
  }

  /* FOOTER */
  footer {
    border-top: 1px solid #f0f0f0;
    padding: 16px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: #aaa;
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     NAV BAR
     Logo di kiri: .logo-mark (ikon) + .logo-text (nama)
     Ganti konten .logo-mark dengan <img> jika sudah punya file logo
════════════════════════════════════════════════════════════ -->
<nav>
  <a class="nav-brand" href="#">
    <img src="logo.png" alt="SEPIA" height="72" />
    </div>
    <span class="logo-text">SEPIA</span>
  </a>

  <nav class="nav-links">
    <!-- tambah link navigasi di sini jika perlu -->
  </nav>

  <div class="nav-cta">
    <button class="btn-outline">Masuk</button>
    <button class="btn-dark">Daftar Gratis</button>
  </div>
</nav>

<!-- ═══════════════════════════════════════════════════════════
     HERO
     Logo besar di atas heading: .hero-logo-mark + .hero-logo-label
     Ganti konten .hero-logo-mark dengan <img> jika sudah punya file logo
════════════════════════════════════════════════════════════ -->
<div class="hero">

  <div class="hero-logo">
    <div class="hemarkro-logo-">

    </div>
    <span class="hero-logo-label">SEPIA</span>
    <!-- Jika sudah punya wordmark, ganti baris di atas dengan:
         <img src="wordmark.svg" alt="SEPIA" height="20" /> -->
  </div>

  <h1>Analisis <span class="gradient-word">SEPIA</span></h1>

  <p>
    Tranformasi Intelijen Berbasis AI — diekstrak dari sumber yang kamu percaya, ditenagai model Gemini, Qwen, dan Llama terkini.
  </p>

  <div class="hero-buttons">
    <button class="btn-hero-dark" onclick="window.location.href='login2.html'">
      Masuk ke SEPIA
    </button>
    <button class="btn-hero-outline">Daftar Gratis</button>
  </div>

  <div class="trust">
    <div class="trust-item"><div class="trust-dot"></div>Ekstraksi otomatis</div>
    <div class="trust-sep"></div>
    <div class="trust-item"><div class="trust-dot"></div>Kronologi & aktor</div>
    <div class="trust-sep"></div>
    <div class="trust-item"><div class="trust-dot"></div>Powered by Gemini · Qwen · Llama</div>
    <div class="trust-sep"></div>
    <div class="trust-item"><div class="trust-dot"></div>v 1.0</div>
  </div>
</div>

<footer>
  <span>SEPIA © 2026</span>
  <span>Powered by Gemini · Qwen · Llama</span>
</footer>

</body>
</html>
